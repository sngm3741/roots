auth:
  dev:
    allowedOrigins:
      - https://app.dev.example.com
    defaultRedirectOrigin: https://app.dev.example.com
    redirectPath: /auth/result
    line:
      channelID: dev-line-channel
      channelSecret: dev-line-secret
      redirectURI: https://app.dev.example.com/auth/line/callback
      scopes: ["profile", "openid"]
      stateSecret: dev-line-state
      stateTTL: 10m
      jwtSecret: dev-line-jwt
      jwtIssuer: auth-line
      jwtAudience: app-dev
      jwtExpiresIn: 24h
    twitter:
      clientID: dev-twitter-client
      clientSecret: dev-twitter-secret
      redirectURI: https://app.dev.example.com/auth/twitter/callback
      scopes: ["tweet.read"]
      stateSecret: dev-twitter-state
      stateTTL: 10m
      jwtSecret: dev-twitter-jwt
      jwtIssuer: auth-twitter
      jwtAudience: app-dev
      jwtExpiresIn: 24h
