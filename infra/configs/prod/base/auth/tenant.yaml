auth:
  prod:
    allowedOrigins:
      - https://app.example.com
    defaultRedirectOrigin: https://app.example.com
    redirectPath: /auth/result
    line:
      channelID: prod-line-channel
      channelSecret: prod-line-secret
      redirectURI: https://app.example.com/auth/line/callback
      scopes: ["profile", "openid"]
      stateSecret: prod-line-state-secret
      stateTTL: 10m
      jwtSecret: prod-line-jwt-secret
      jwtIssuer: auth-line
      jwtAudience: app-prod-api
      jwtExpiresIn: 24h
    twitter:
      clientID: prod-twitter-client
      clientSecret: prod-twitter-secret
      redirectURI: https://app.example.com/auth/twitter/callback
      scopes: ["tweet.read"]
      stateSecret: prod-twitter-state-secret
      stateTTL: 10m
      jwtSecret: prod-twitter-jwt-secret
      jwtIssuer: auth-twitter
      jwtAudience: app-prod-api
      jwtExpiresIn: 24h
