version: "3.9"

services:
  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
    command: ["-js"]

  minio:
    image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  auth:
    build:
      context: ../../..
      dockerfile: base/auth/backend/Dockerfile
    environment:
      AUTH_HTTP_ADDR: ":8080"
      AUTH_HTTP_TIMEOUT: 30s
      AUTH_TENANT_CONFIG_PATH: /config/tenants.yaml
    volumes:
      - ../../configs/local/base/auth/tenants/local.yaml:/config/tenants.yaml:ro
    depends_on:
      - nats

  message-ingress:
    build:
      context: ../../..
      dockerfile: base/message/backend/Dockerfile
      args:
        BIN: ingress
    environment:
      MESSAGE_INGRESS_HTTP_ADDR: ":8080"
      MESSAGE_HTTP_TIMEOUT: 30s
      MESSAGE_INGRESS_TIMEOUT: 5s
      MESSAGE_TENANT_CONFIG_PATH: /config/tenants.yaml
    volumes:
      - ../../configs/local/base/message/tenants/local.yaml:/config/tenants.yaml:ro
    depends_on:
      - nats

  message-webhook:
    build:
      context: ../../..
      dockerfile: base/message/backend/Dockerfile
      args:
        BIN: webhook
    environment:
      MESSAGE_WEBHOOK_HTTP_ADDR: ":8080"
      MESSAGE_HTTP_TIMEOUT: 30s
      MESSAGE_WEBHOOK_MAX_BODY: 1048576
      MESSAGE_TENANT_CONFIG_PATH: /config/tenants.yaml
    volumes:
      - ../../configs/local/base/message/tenants/local.yaml:/config/tenants.yaml:ro
    depends_on:
      - nats

  message-worker:
    build:
      context: ../../..
      dockerfile: base/message/backend/Dockerfile
      args:
        BIN: worker
    environment:
      MESSAGE_TENANT_CONFIG_PATH: /config/tenants.yaml
    volumes:
      - ../../configs/local/base/message/tenants/local.yaml:/config/tenants.yaml:ro
    depends_on:
      - nats

  storage:
    build:
      context: ../../..
      dockerfile: base/storage/backend/Dockerfile
    environment:
      STORAGE_HTTP_ADDR: ":8080"
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_BUCKET: media
      STORAGE_PUBLIC_BASE: http://storage.localhost
      STORAGE_ALLOWED_TYPES: image/
    depends_on:
      - minio

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth
      - message-ingress
      - message-webhook
      - storage

volumes:
  minio-data:
