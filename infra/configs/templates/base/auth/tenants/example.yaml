auth:
  tenantA:
    allowedOrigins:
      - https://appA.example.com
    defaultRedirectOrigin: ""
    redirectPath: /auth/login/result
    line:
      channelID: tenantA-line-channel
      channelSecret: tenantA-line-secret
      redirectURI: https://appA.example.com/auth/line/callback
      scopes: ["profile", "openid"]
      stateSecret: tenantA-line-state-secret
      stateTTL: 10m
      jwtSecret: tenantA-line-jwt-secret
      jwtIssuer: auth-line
      jwtAudience: appA-api
      jwtExpiresIn: 24h
    twitter:
      clientID: tenantA-twitter-client
      clientSecret: tenantA-twitter-secret
      redirectURI: https://appA.example.com/auth/twitter/callback
      scopes: ["tweet.read", "users.read", "offline.access"]
      stateSecret: tenantA-twitter-state-secret
      stateTTL: 10m
      jwtSecret: tenantA-twitter-jwt-secret
      jwtIssuer: auth-twitter
      jwtAudience: appA-api
      jwtExpiresIn: 24h
  tenantB:
    allowedOrigins:
      - https://appB.example.com
    defaultRedirectOrigin: ""
    redirectPath: /auth/login/result
    line:
      channelID: tenantB-line-channel
      channelSecret: tenantB-line-secret
      redirectURI: https://appB.example.com/auth/line/callback
      scopes: ["profile", "openid"]
      stateSecret: tenantB-line-state-secret
      stateTTL: 10m
      jwtSecret: tenantB-line-jwt-secret
      jwtIssuer: auth-line
      jwtAudience: appB-api
      jwtExpiresIn: 24h
    twitter:
      clientID: tenantB-twitter-client
      clientSecret: tenantB-twitter-secret
      redirectURI: https://appB.example.com/auth/twitter/callback
      scopes: ["tweet.read"]
      stateSecret: tenantB-twitter-state-secret
      stateTTL: 10m
      jwtSecret: tenantB-twitter-jwt-secret
      jwtIssuer: auth-twitter
      jwtAudience: appB-api
      jwtExpiresIn: 24h
